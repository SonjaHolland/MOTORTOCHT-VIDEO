<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Music Video</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

#player {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    border: none;
}
</style>
</head>

<body>

<iframe
    id="player"
    src="https://www.youtube.com/embed/fDZYQD1GDd4?autoplay=1&mute=0&controls=0&loop=1&playlist=fDZYQD1GDd4&rel=0&modestbranding=1&fs=1"
    allow="autoplay; fullscreen"
    allowfullscreen>
</iframe>

</body>
</html>
